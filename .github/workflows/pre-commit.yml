name: pre-commit
permissions:
  contents: read
on:
  push:
    branches: [master]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: python -m pip install pre-commit==4.5.1
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
